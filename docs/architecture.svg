<svg width="680" height="850" viewBox="0 0 680 850" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Legal RAG chatbot architecture</title>
<desc>Layered architecture diagram: Streamlit frontend, FastAPI backend, hybrid retrieval and Gemini generation engine, and a flat-file data layer, with a request flow summary.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="680" height="850" fill="#FFFFFF"/>

<g>
<rect x="40" y="40" width="600" height="140" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="64" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#26215C">Frontend — Streamlit</text>
<text x="340" y="82" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#3C3489">Single-page Python chat UI</text>
</g>
<g>
<rect x="170" y="100" width="160" height="56" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="250" y="120" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Chat interface</text>
<text x="250" y="138" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Question + history</text>
</g>
<g>
<rect x="350" y="100" width="160" height="56" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="430" y="120" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Sources panel</text>
<text x="430" y="138" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Expandable citations</text>
</g>

<line x1="340" y1="180" x2="340" y2="210" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="352" y="197" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">REST / JSON (fetch)</text>

<g>
<rect x="40" y="210" width="600" height="140" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="234" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#04342C">Backend API — FastAPI</text>
<text x="340" y="252" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#085041">Uvicorn, loads engine at startup</text>
</g>
<g>
<rect x="170" y="270" width="160" height="56" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="250" y="290" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">GET /health</text>
<text x="250" y="308" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Index load status</text>
</g>
<g>
<rect x="350" y="270" width="160" height="56" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="430" y="290" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">POST /query</text>
<text x="430" y="308" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Question in, answer out</text>
</g>

<line x1="340" y1="350" x2="340" y2="380" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="352" y="367" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">question text</text>

<g>
<rect x="40" y="380" width="600" height="140" rx="14" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="404" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">RAG engine — retrieval + generation</text>
<text x="340" y="422" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#712B13">rag_engine.py orchestrates every step</text>
</g>
<g>
<rect x="60" y="440" width="128" height="56" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="124" y="460" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">FAISS search</text>
<text x="124" y="478" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Semantic hits</text>
</g>
<g>
<rect x="204" y="440" width="128" height="56" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="268" y="460" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">BM25 search</text>
<text x="268" y="478" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Keyword top-10</text>
</g>
<g>
<rect x="348" y="440" width="128" height="56" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="412" y="460" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">RRF fusion</text>
<text x="412" y="478" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Merge rankings</text>
</g>
<g>
<rect x="492" y="440" width="128" height="56" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="556" y="460" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Gemini call</text>
<text x="556" y="478" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Cited answer</text>
</g>

<line x1="340" y1="550" x2="340" y2="520" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="352" y="537" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">loaded at startup</text>

<g>
<rect x="40" y="550" width="600" height="140" rx="14" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="574" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#042C53">Data layer — flat files, no database</text>
<text x="340" y="592" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#0C447C">JSON + FAISS index, read from disk</text>
</g>
<g>
<rect x="70" y="610" width="260" height="56" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="200" y="630" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Raw statute JSON</text>
<text x="200" y="648" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">8 acts, 3173 sections</text>
</g>
<g>
<rect x="350" y="610" width="260" height="56" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="480" y="630" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">FAISS index + metadata</text>
<text x="480" y="648" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Prebuilt, committed to repo</text>
</g>

<g>
<rect x="40" y="720" width="600" height="110" rx="14" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="60" y="742" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Typical request flow</text>
<text x="60" y="766" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">1. Frontend posts question to /query   2. Backend hands it to the RAG engine</text>
<text x="60" y="786" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">3. FAISS + BM25 retrieve sections, fused by RRF   4. Sections + question sent to Gemini</text>
<text x="60" y="806" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">5. Cited answer (or offline fallback) returns to Streamlit with its sources</text>
</g>
</svg>
