name: CI-CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: vars
        run: echo "tag=$(TZ='Asia/Kolkata' date +%Y-%m-%d_%H-%M-%S)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          load: true
          tags: chitranganalaxkar/legal-chatbot-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend.Dockerfile
          load: true
          tags: chitranganalaxkar/legal-chatbot-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Smoke test - backend starts and responds
        run: |
          docker run -d --name test-backend \
            -p 8000:8000 \
            -v ${{ github.workspace }}/backend/data:/app/backend/data \
            --env GEMINI_API_KEY=dummy-key-for-smoke-test \
            chitranganalaxkar/legal-chatbot-backend:latest
          sleep 15
          curl --fail http://localhost:8000/health || (docker logs test-backend && exit 1)
          docker stop test-backend

      - name: Push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: |
            chitranganalaxkar/legal-chatbot-backend:latest
            chitranganalaxkar/legal-chatbot-backend:${{ steps.vars.outputs.tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: |
            chitranganalaxkar/legal-chatbot-frontend:latest
            chitranganalaxkar/legal-chatbot-frontend:${{ steps.vars.outputs.tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    needs: build-test-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Legal-Chatbot
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sleep 10
            curl --fail http://localhost:8000/health